name: Azure Static Web Apps - dev

# Deploys the dev environment on pushes to the `dev` branch.
# Netlify is unaffected (it builds from `main`).
# The deploy step self-skips until the AZURE_SWA_TOKEN_DEV secret exists,
# so this workflow never fails before the dev Static Web App is provisioned.
on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy (dev)
    env:
      SWA_TOKEN: ${{ secrets.AZURE_SWA_TOKEN_DEV }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Waiting for provisioning
        if: env.SWA_TOKEN == ''
        run: echo "AZURE_SWA_TOKEN_DEV not set yet — dev Static Web App not provisioned. Skipping deploy."

      - name: Build And Deploy
        if: env.SWA_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: upload
          # Frontend (Vite) builds from repo root into dist/
          app_location: "/"
          output_location: "dist"
          # Serverless API (Azure Functions v4) lives in api/
          api_location: "api"
