name: Azure Static Web Apps - prod

# Deploys the prod environment on pushes to `main`.
# Netlify also builds from main; the two run in parallel until DNS cutover.
# Self-skips until AZURE_SWA_TOKEN_PROD exists, so it never fails pre-provision.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy (prod)
    env:
      SWA_TOKEN: ${{ secrets.AZURE_SWA_TOKEN_PROD }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Waiting for provisioning
        if: env.SWA_TOKEN == ''
        run: echo "AZURE_SWA_TOKEN_PROD not set yet — prod Static Web App not provisioned. Skipping deploy."

      - name: Build And Deploy
        if: env.SWA_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: upload
          app_location: "/"
          output_location: "dist"
          api_location: "api"
